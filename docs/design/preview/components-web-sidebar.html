<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Web nav · sidebar</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame" style="padding: 0; background: #f5f4f1;">
  <div style="display:grid; grid-template-columns: 240px 1fr; min-height: 260px;">
    <aside style="background: white; border-right: 1.5px solid #d9d5ce; padding: 0; display:flex; flex-direction:column;">
      <!-- Logo block with bottom divider -->
      <div style="padding: 18px 20px 16px; border-bottom: 1.5px solid #eceae5; font: 700 17px var(--font-sans); color:#5e42c0; letter-spacing:-0.01em;">Psico Platform</div>

      <!-- Section label -->
      <div style="padding: 14px 20px 6px; font: 700 10px var(--font-sans); letter-spacing: 0.12em; text-transform: uppercase; color:#928d84;">Menú</div>

      <!-- Nav items: bordered rows, not floating pills -->
      <nav style="display:flex; flex-direction:column; padding: 0;">
        <a style="display:flex; align-items:center; gap:12px; padding: 12px 20px; border-left: 3px solid #5e42c0; background:#f7f5ff; color:#3c2a80; font:600 14px var(--font-sans); text-decoration:none;"><span style="width:20px; text-align:center;">🏠</span>Inicio</a>
        <a style="display:flex; align-items:center; gap:12px; padding: 12px 20px; border-left: 3px solid transparent; color:#574f45; font:500 14px var(--font-sans); text-decoration:none; border-bottom:1px solid #f5f4f1;"><span style="width:20px; text-align:center; color:#928d84;">📚</span>Mis libros</a>
        <a style="display:flex; align-items:center; gap:12px; padding: 12px 20px; border-left: 3px solid transparent; color:#574f45; font:500 14px var(--font-sans); text-decoration:none; border-bottom:1px solid #f5f4f1;"><span style="width:20px; text-align:center; color:#928d84;">💳</span>Mi plan</a>
        <a style="display:flex; align-items:center; gap:12px; padding: 12px 20px; border-left: 3px solid transparent; color:#574f45; font:500 14px var(--font-sans); text-decoration:none;"><span style="width:20px; text-align:center; color:#928d84;">👤</span>Perfil</a>
      </nav>

      <!-- Plan summary, framed -->
      <div style="margin: 16px 16px; padding: 14px; border: 1.5px solid #eceae5; border-radius: 12px; background:#fafaf8;">
        <div style="font: 700 10px var(--font-sans); letter-spacing: 0.12em; text-transform: uppercase; color:#928d84; margin-bottom:4px;">Tu plan</div>
        <div style="font: 600 14px var(--font-sans); color:#3d3730;">Pro · $7/mes</div>
        <div style="font: 11px var(--font-sans); color:#928d84; margin-top:2px;">Próximo cobro: 14 may</div>
      </div>
    </aside>

    <div style="background:#fafaf8;">
      <div style="height:48px; background:white; border-bottom:1.5px solid #d9d5ce; padding: 0 24px; display:flex; align-items:center; justify-content:space-between;">
        <div style="font:600 14px var(--font-sans); color:#3d3730;">Inicio</div>
        <div style="display:flex; gap:8px; align-items:center;">
          <span style="font: 500 12px var(--font-sans); color:#706b62;">Ana Pérez</span>
          <div style="width:28px; height:28px; border-radius:9999px; background: linear-gradient(135deg,#c3baff,#7558e0); color:white; font:600 12px var(--font-sans); display:flex; align-items:center; justify-content:center;">A</div>
        </div>
      </div>
      <div style="padding: 22px 24px;">
        <div style="font:700 22px var(--font-sans); color:#2a2420; margin-bottom: 4px; letter-spacing:-0.01em;">Hola, Ana 👋</div>
        <div style="font:13px var(--font-sans); color:#928d84;">Continúa tu camino al bienestar emocional</div>
      </div>
    </div>
  </div>
</div>
</body></html>
