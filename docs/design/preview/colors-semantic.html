<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Semantic colors</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame">
  <p class="label">Semantic roles</p>
  <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
    <div style="background: #FEF2F2; border: 1px solid #FECACA; border-radius: 12px; padding: 10px 14px;">
      <div style="font-size: 11px; font-weight: 700; color: #B91C1C; margin-bottom: 4px;">Error</div>
      <div style="font-size: 12px; color: #B91C1C; line-height: 1.4;">Las contraseñas no coinciden.</div>
      <div class="mono tertiary" style="font-size: 10px; margin-top: 6px;">#FEF2F2 / #FECACA / #B91C1C</div>
    </div>
    <div style="background: #FEF9E7; border: 1px solid #FDE68A; border-radius: 12px; padding: 10px 14px;">
      <div style="font-size: 11px; font-weight: 700; color: #B45309; margin-bottom: 4px;">Warning</div>
      <div style="font-size: 12px; color: #B45309; line-height: 1.4;">Tu suscripción no se renovará.</div>
      <div class="mono tertiary" style="font-size: 10px; margin-top: 6px;">#FEF9E7 / #FDE68A / #B45309</div>
    </div>
    <div style="background: #e4efe0; border: 1px solid #c8dfc3; border-radius: 12px; padding: 10px 14px;">
      <div style="font-size: 11px; font-weight: 700; color: #3a5e34; margin-bottom: 4px;">Success</div>
      <div style="font-size: 12px; color: #3a5e34; line-height: 1.4;">✓ Plan PRO activo</div>
      <div class="mono tertiary" style="font-size: 10px; margin-top: 6px;">sage-100 / 200 / 700</div>
    </div>
  </div>
</div>
</body></html>
