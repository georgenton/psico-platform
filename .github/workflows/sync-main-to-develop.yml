name: Sync main to develop

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create sync PR if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin
          COMMITS=$(git log origin/develop..origin/main --oneline | wc -l)
          if [ "$COMMITS" -gt "0" ]; then
            BRANCH="sync/main-to-develop-$(date +%Y%m%d-%H%M%S)"
            git checkout -b $BRANCH origin/main
            git push origin $BRANCH
            gh pr create \
              --base develop \
              --head $BRANCH \
              --title "chore: sync main fixes to develop" \
              --body "Auto-sync: main has $COMMITS commit(s) not in develop"
          else
            echo "develop is up to date with main, nothing to sync"
          fi
