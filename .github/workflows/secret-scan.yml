name: Secret Scan

# Scans ONLY the diff of each PR (the commit range base..head), not full
# history — new secrets are blocked at the PR, settled historical findings are
# baselined by SHA in .gitleaks.toml.
on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks (PR diff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the base..head range is resolvable.
          fetch-depth: 0

      - name: Install gitleaks (pinned)
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan PR diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Scanning commit range ${BASE}..${HEAD}"
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="${BASE}..${HEAD}" \
            --redact \
            --no-banner \
            --exit-code 1 \
            --verbose
