<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lavender</title>
<link rel="stylesheet" href="_card.css" />
</head>
<body>
<div class="card-frame">
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <p class="label">Lavender · primary</p>
    <p class="label" style="color: var(--fg-muted); letter-spacing: 0; text-transform: none; font-weight: 500; font-size: 11px;">identity · headings · links</p>
  </div>
  <div class="swatch-strip">
    <div class="swatch dark-text" style="background: #f7f5ff;"><span class="name">50</span><span class="hex">#f7f5ff</span></div>
    <div class="swatch dark-text" style="background: #eeebff;"><span class="name">100</span><span class="hex">#eeebff</span></div>
    <div class="swatch dark-text" style="background: #ddd8ff;"><span class="name">200</span><span class="hex">#ddd8ff</span></div>
    <div class="swatch dark-text" style="background: #c3baff;"><span class="name">300</span><span class="hex">#c3baff</span></div>
    <div class="swatch" style="background: #a697ff;"><span class="name">400</span><span class="hex">#a697ff</span></div>
    <div class="swatch" style="background: #8b71f5;"><span class="name">500</span><span class="hex">#8b71f5</span></div>
    <div class="swatch" style="background: #7558e0;"><span class="name">600</span><span class="hex">#7558e0</span></div>
    <div class="swatch" style="background: #5e42c0;"><span class="name">700</span><span class="hex">#5e42c0</span></div>
    <div class="swatch" style="background: #4d36a0;"><span class="name">800</span><span class="hex">#4d36a0</span></div>
    <div class="swatch" style="background: #3c2a80;"><span class="name">900</span><span class="hex">#3c2a80</span></div>
    <div class="swatch" style="background: #25185c;"><span class="name">950</span><span class="hex">#25185c</span></div>
  </div>
  <div class="row tertiary" style="font-size: 11px;">
    <span><strong style="color: var(--fg-body);">500</strong> brand surface</span>
    <span>·</span>
    <span><strong style="color: var(--fg-body);">600</strong> link / pressed</span>
    <span>·</span>
    <span><strong style="color: var(--fg-body);">700</strong> wordmark</span>
    <span>·</span>
    <span><strong style="color: var(--fg-body);">100</strong> soft button bg</span>
  </div>
</div>
</body>
</html>
