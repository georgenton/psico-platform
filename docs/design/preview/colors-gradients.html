<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Gradients</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame">
  <p class="label">Gradients · used in product</p>
  <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div>
      <div style="aspect-ratio: 1.2/1; border-radius: 14px; background: linear-gradient(145deg, #f7f5ff 0%, #fafaf8 65%); position: relative; overflow: hidden;">
        <div style="position:absolute; right:-30%; top:-40%; width:80%; height:80%; border-radius:50%; background: radial-gradient(circle, #c3baff, transparent 70%); opacity: 0.30;"></div>
        <div style="position:absolute; left:-20%; bottom:-30%; width:60%; height:60%; border-radius:50%; background: radial-gradient(circle, #c8dfc3, transparent 70%); opacity: 0.20;"></div>
      </div>
      <div style="font-size: 10px; color: var(--fg-muted); margin-top: 6px;">Hero — lavender→warm + blobs</div>
    </div>
    <div>
      <div style="aspect-ratio: 1.2/1; border-radius: 14px; background: linear-gradient(135deg, #7558e0 0%, #3c2a80 100%);"></div>
      <div style="font-size: 10px; color: var(--fg-muted); margin-top: 6px;">CTA — lavender 600→900</div>
    </div>
    <div>
      <div style="aspect-ratio: 1.2/1; border-radius: 14px; background: linear-gradient(135deg, #a697ff 0%, #5e42c0 100%);"></div>
      <div style="font-size: 10px; color: var(--fg-muted); margin-top: 6px;">Cover · cool</div>
    </div>
    <div>
      <div style="aspect-ratio: 1.2/1; border-radius: 14px; background: linear-gradient(135deg, #7fae76 0%, #3a5e34 100%);"></div>
      <div style="font-size: 10px; color: var(--fg-muted); margin-top: 6px;">Cover · warm</div>
    </div>
    <div>
      <div style="aspect-ratio: 1.2/1; border-radius: 14px; background: linear-gradient(135deg, #c3baff 0%, #5e9254 100%);"></div>
      <div style="font-size: 10px; color: var(--fg-muted); margin-top: 6px;">Cover · mixed</div>
    </div>
  </div>
</div>
</body></html>
