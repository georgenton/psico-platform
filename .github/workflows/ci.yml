name: CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "release/**"
      - "changeset-release/**"
      - "sync/**"
  pull_request:
    branches:
      - develop
      - main
      - "changeset-release/**"
      - "sync/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Lint (affected)
        run: pnpm turbo run lint --affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck --affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  test:
    name: Test
    runs-on: ubuntu-latest
    # PR-0.1 — the privacy barrier is a Postgres row lock, and its correctness is
    # a claim ABOUT POSTGRES: that `FOR SHARE` conflicts with `FOR UPDATE` and
    # with a plain UPDATE, and that shares do not conflict with each other. A mock
    # cannot answer that question — it can only replay what we believe. So CI runs
    # a real database and asks it. Without this service the lock suite would skip,
    # and a skipped barrier test is worse than none: it reads as coverage.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psico_locks
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      # Sprint S41 (cierre deuda S39+S40): tests split por workspace para
      # visibilidad explícita en la UI de GitHub Actions. Cada step usa
      # turbo + --filter para preservar el cache `.turbo`, y los 4 corren
      # SIEMPRE (sin --affected) — la safety net es más valiosa que el
      # ahorro de CI minutes en este monorepo. Un fallo en un workspace no
      # esconde el status de los otros.
      - name: Test · API (Vitest + Nest unit, no DB in CI)
        run: pnpm turbo run test --filter=@psico/api
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # The lock suite runs against the `postgres` service above, NOT against a
      # double. It creates the one table it needs (`User(id)`) and drives two
      # genuinely concurrent transactions. If TEST_DATABASE_URL were missing these
      # specs would skip silently — so this step exists precisely to make sure
      # they cannot.
      - name: Test · API locks (real PostgreSQL — privacy barrier)
        run: pnpm --filter @psico/api test:locks
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/psico_locks

      - name: Test · Crypto (Argon2id + AEAD roundtrip)
        run: pnpm turbo run test --filter=@psico/crypto
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Test · Web (Vitest + RTL + jsdom)
        run: pnpm turbo run test --filter=@psico/web
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Test · Mobile (Jest + jest-expo + RNTL)
        run: pnpm turbo run test --filter=@psico/mobile
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  privacy:
    name: Privacy (no ciphertext logging — ADR 0007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sprint S6 invariant from ADR 0007 §verification:
      # No source line under apps/api/src/ may pass a ciphertext field to
      # console.* / logger.*. The grep-based guard runs in seconds and is
      # mirrored by diario.privacy.spec.ts inside the test suite.
      - name: Grep for ciphertext-in-logs (must return no matches)
        run: |
          set -e
          MATCHES=$(grep -rnE \
            '(console\.(log|debug|info|warn|error)|(this\.)?logger\.(log|debug|info|warn|error))\s*\([^)]*\b(textCiphertext|textNonce|excerptCiphertext|wrappedKey|ciphertextForTherapist)\b' \
            apps/api/src/ \
            --include='*.ts' \
            --exclude='*.spec.ts' \
            --exclude='*.privacy.spec.ts' || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Found ciphertext fields inside logger/console calls:"
            echo "$MATCHES"
            echo ""
            echo "ADR 0007 forbids logging encrypted material. Remove the log"
            echo "or move it behind a metadata-only summary."
            exit 1
          fi
          echo "✅ No ciphertext in logger/console calls."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, privacy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Build (affected, excludes mobile — built via EAS)
        run: pnpm turbo run build --affected --filter=!@psico/mobile
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
