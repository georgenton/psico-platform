name: Sync main to develop

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Sync main into develop via auto-resolved PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin

          COMMITS=$(git log origin/develop..origin/main --oneline | wc -l)
          if [ "$COMMITS" -eq "0" ]; then
            echo "develop is up to date with main, nothing to sync"
            exit 0
          fi

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BRANCH="sync/main-${TIMESTAMP}"

          # Base the sync branch on develop so the PR diff is minimal.
          git checkout -b "$BRANCH" origin/develop

          # Merge main without auto-committing so we can resolve conflicts first.
          # Exit code 1 means conflicts exist — || true lets us handle them below.
          git merge origin/main --no-ff --no-commit || true

          # For packages/*/CHANGELOG.md and packages/*/package.json always prefer
          # main's version (--theirs = main when merging main into a develop-based branch).
          git checkout --theirs -- packages/ 2>/dev/null || true
          git add packages/ 2>/dev/null || true

          # Regenerate pnpm-lock.yaml if it has merge conflicts rather than keeping
          # a syntactically broken lockfile.
          if git diff --name-only --diff-filter=U | grep -q "pnpm-lock.yaml"; then
            git checkout --theirs -- pnpm-lock.yaml
            pnpm install --no-frozen-lockfile
            git add pnpm-lock.yaml
          fi

          # Stage everything else (cleanly merged files are already staged by git).
          git add -A

          # Fail loudly if any conflicts remain so the action is visibly broken.
          UNRESOLVED=$(git diff --name-only --diff-filter=U)
          if [ -n "$UNRESOLVED" ]; then
            echo "ERROR: unresolved conflicts remain:"
            echo "$UNRESOLVED"
            exit 1
          fi

          git commit -m "chore: sync main into develop (auto-resolved package conflicts)"

          git push origin "$BRANCH"

          printf '## Auto-sync: main → develop\n\nConflicts resolved automatically:\n\n| File pattern | Strategy |\n|---|---|\n| `packages/*/CHANGELOG.md` | Used main version (`--theirs`) |\n| `packages/*/package.json` | Used main version (`--theirs`) |\n| `pnpm-lock.yaml` | Regenerated with `pnpm install` |\n\n> Triggered by a push to `main`. Review and merge when CI is green.\n' \
            > /tmp/pr-body.md

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "chore: sync main into develop" \
            --body-file /tmp/pr-body.md
