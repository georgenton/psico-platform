name: CI

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "chore/**"
      - "refactor/**"
      - "release/**"
      - "changeset-release/**"
      - "sync/**"
  pull_request:
    branches:
      - develop
      - main
      - "changeset-release/**"
      - "sync/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Lint (affected)
        run: pnpm turbo run lint --affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Typecheck (affected)
        run: pnpm turbo run typecheck --affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Test (affected, unit only — no DB in CI)
        run: pnpm turbo run test --affected
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  privacy:
    name: Privacy (no ciphertext logging — ADR 0007)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Sprint S6 invariant from ADR 0007 §verification:
      # No source line under apps/api/src/ may pass a ciphertext field to
      # console.* / logger.*. The grep-based guard runs in seconds and is
      # mirrored by diario.privacy.spec.ts inside the test suite.
      - name: Grep for ciphertext-in-logs (must return no matches)
        run: |
          set -e
          MATCHES=$(grep -rnE \
            '(console\.(log|debug|info|warn|error)|(this\.)?logger\.(log|debug|info|warn|error))\s*\([^)]*\b(textCiphertext|textNonce|excerptCiphertext|wrappedKey|ciphertextForTherapist)\b' \
            apps/api/src/ \
            --include='*.ts' \
            --exclude='*.spec.ts' \
            --exclude='*.privacy.spec.ts' || true)
          if [ -n "$MATCHES" ]; then
            echo "❌ Found ciphertext fields inside logger/console calls:"
            echo "$MATCHES"
            echo ""
            echo "ADR 0007 forbids logging encrypted material. Remove the log"
            echo "or move it behind a metadata-only summary."
            exit 1
          fi
          echo "✅ No ciphertext in logger/console calls."

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, privacy]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @psico/api exec prisma generate

      - name: Build (affected, excludes mobile — built via EAS)
        run: pnpm turbo run build --affected --filter=!@psico/mobile
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
