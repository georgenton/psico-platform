<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Shadows</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame">
  <p class="label">Elevation</p>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 8px 4px 16px;">
    <div style="text-align:center;">
      <div style="height: 70px; background: white; border-radius: 16px; box-shadow: 0 1px 4px 0 rgb(42 36 32 / 0.05);"></div>
      <div class="mono tertiary" style="font-size:10px; margin-top:8px;">--shadow-card-sm</div>
      <div class="tertiary" style="font-size:10px;">chapter rows</div>
    </div>
    <div style="text-align:center;">
      <div style="height: 70px; background: white; border-radius: 16px; box-shadow: 0 1px 4px 0 rgb(42 36 32 / 0.06), 0 4px 24px 0 rgb(42 36 32 / 0.04);"></div>
      <div class="mono tertiary" style="font-size:10px; margin-top:8px;">--shadow-card</div>
      <div class="tertiary" style="font-size:10px;">default cards</div>
    </div>
    <div style="text-align:center;">
      <div style="height: 70px; background: white; border-radius: 16px; box-shadow: 0 2px 16px 0 rgb(139 113 245 / 0.08);"></div>
      <div class="mono tertiary" style="font-size:10px; margin-top:8px;">--shadow-soft</div>
      <div class="tertiary" style="font-size:10px;">PRO card · lavender tint</div>
    </div>
    <div style="text-align:center;">
      <div style="height: 70px; background: linear-gradient(135deg,#a697ff,#5e42c0); border-radius: 16px; box-shadow: 0 8px 20px 0 rgb(37 24 92 / 0.15);"></div>
      <div class="mono tertiary" style="font-size:10px; margin-top:8px;">--shadow-cover</div>
      <div class="tertiary" style="font-size:10px;">book cover lift</div>
    </div>
  </div>
</div>
</body></html>
