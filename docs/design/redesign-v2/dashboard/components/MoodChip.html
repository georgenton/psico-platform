<!-- MoodChip — global daily mood control in topbar. Opens MoodPopover. State persisted in localStorage key "psico-mood". -->
<div class="mood-wrap">
  <button class="mood-chip" id="moodChip"><span class="mc-face"><!-- face svg --></span><span class="mc-txt" id="moodChipText">¿Cómo estás?</span><!-- chevron --></button>
  <div class="mood-pop" id="moodPop"><!-- 5 mood options: great/good/ok/low/hard --></div>
</div>
