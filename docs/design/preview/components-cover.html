<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Cover tile</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame">
  <p class="label">Book cover tile · 3 gradients × locked state</p>
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;">
    <div style="aspect-ratio: 4/5; border-radius:16px; background: linear-gradient(135deg,#a697ff,#5e42c0); display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.92); font:700 28px var(--font-sans);">EM</div>
    <div style="aspect-ratio: 4/5; border-radius:16px; background: linear-gradient(135deg,#7fae76,#3a5e34); display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.92); font:700 28px var(--font-sans);">FA</div>
    <div style="aspect-ratio: 4/5; border-radius:16px; background: linear-gradient(135deg,#c3baff,#5e9254); display:flex; align-items:center; justify-content:center; color: rgba(255,255,255,0.92); font:700 28px var(--font-sans);">RE</div>
    <div style="aspect-ratio: 4/5; border-radius:16px; background: linear-gradient(135deg,#a697ff,#5e42c0); display:flex; align-items:center; justify-content:center; position:relative;">
      <span style="color: rgba(255,255,255,0.92); font:700 28px var(--font-sans);">PR</span>
      <div style="position:absolute; inset:0; background: rgba(0,0,0,0.35); border-radius:16px; display:flex; align-items:center; justify-content:center; color:white; font-size:24px;">🔒</div>
    </div>
  </div>
</div>
</body></html>
