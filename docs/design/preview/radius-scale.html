<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Radius scale</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame">
  <p class="label">Corner radius</p>
  <div style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px;">
    <div style="text-align:center;"><div style="width:80px; height:64px; background: var(--bg-surface); border:1.5px solid var(--bg-divider); border-radius: 8px; margin:0 auto;"></div><div class="mono tertiary" style="font-size:10px; margin-top:6px;">sm 8</div><div class="tertiary" style="font-size:10px;">input · row</div></div>
    <div style="text-align:center;"><div style="width:80px; height:64px; background: var(--bg-surface); border:1.5px solid var(--bg-divider); border-radius: 12px; margin:0 auto;"></div><div class="mono tertiary" style="font-size:10px; margin-top:6px;">md 12</div><div class="tertiary" style="font-size:10px;">btn · field</div></div>
    <div style="text-align:center;"><div style="width:80px; height:64px; background: var(--bg-surface); border:1.5px solid var(--bg-divider); border-radius: 16px; margin:0 auto;"></div><div class="mono tertiary" style="font-size:10px; margin-top:6px;">lg 16</div><div class="tertiary" style="font-size:10px;">soft btn</div></div>
    <div style="text-align:center;"><div style="width:80px; height:64px; background: var(--bg-surface); border:1.5px solid var(--bg-divider); border-radius: 20px; margin:0 auto;"></div><div class="mono tertiary" style="font-size:10px; margin-top:6px;">xl 20</div><div class="tertiary" style="font-size:10px;">banner</div></div>
    <div style="text-align:center;"><div style="width:80px; height:64px; background: var(--bg-surface); border:1.5px solid var(--bg-divider); border-radius: 32px; margin:0 auto;"></div><div class="mono tertiary" style="font-size:10px; margin-top:6px;">3xl 32</div><div class="tertiary" style="font-size:10px;">card</div></div>
    <div style="text-align:center;"><div style="width:64px; height:64px; background: var(--bg-surface); border:1.5px solid var(--bg-divider); border-radius: 9999px; margin:0 auto;"></div><div class="mono tertiary" style="font-size:10px; margin-top:6px;">full</div><div class="tertiary" style="font-size:10px;">avatar · pill</div></div>
  </div>
</div>
</body></html>
