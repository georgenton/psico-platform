<!doctype html>
<html lang="en"><head><meta charset="utf-8" /><title>Card surface</title><link rel="stylesheet" href="_card.css" /></head>
<body>
<div class="card-frame" style="padding: 24px;">
  <p class="label">Card surface · default</p>
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
    <div style="background:white; border-radius: 32px; box-shadow: 0 1px 4px 0 rgb(42 36 32 / 0.06), 0 4px 24px 0 rgb(42 36 32 / 0.04); overflow:hidden; display:flex; flex-direction:column;">
      <div style="height:90px; background: linear-gradient(135deg,#a697ff,#5e42c0); display:flex; align-items:center; justify-content:center; font-size:32px;">📖</div>
      <div style="padding:14px 16px;">
        <span style="display:inline-flex; background:#e4efe0; color:#3a5e34; border-radius:9999px; padding:2px 10px; font: 700 11px var(--font-sans); margin-bottom:6px;">Gratuito</span>
        <div style="font: 600 15px var(--font-sans); color:#3d3730; margin-bottom:2px;">Emociones en Construcción</div>
        <div style="font: 12px var(--font-sans); color:#928d84; line-height:1.4;">12 capítulos · psicología cognitiva</div>
      </div>
    </div>
    <div style="background:white; border:1.5px solid #eceae5; border-radius: 32px; padding: 18px 20px;">
      <div style="font: 700 16px var(--font-sans); color:#3d3730; margin-bottom:4px;">Plan Anual</div>
      <div style="font: 700 28px var(--font-sans); color:#7558e0;">$59<span style="font: 12px var(--font-sans); color:#928d84;">/año</span></div>
      <div style="font: 12px var(--font-sans); color:#928d84; margin-top:4px;">El mejor valor para crecimiento sostenido</div>
    </div>
  </div>
  <div class="row mono tertiary" style="font-size: 11px;">
    <span>radius 32</span><span>·</span><span>shadow-card</span><span>·</span><span>1.5px warm-200 alt</span>
  </div>
</div>
</body></html>
