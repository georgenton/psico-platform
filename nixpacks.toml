[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.33.2 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = ["pnpm turbo run build --filter=@psico/api"]

[start]
cmd = "pnpm --filter @psico/api start:prod"
